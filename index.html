
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ukulele Tabs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h1><a href="index.html">Soumya Ranjan</a></h1>
</div>

<div class="container">

<div class="hero">
  <h2>Ukulele Tabs</h2>
  <p>Play songs easily with clean visual tabs</p>
</div>

<div class="search-wrapper">
  <input id="searchBox" placeholder="Search songs...">
</div>

<div class="divider"></div>

<div class="song-list">

<a href="songs/song1.html" class="song-card" data-title="tum se hi">
  <div>Tum Se Hi</div>
</a>
<a href="songs/song2.html" class="song-card" data-title="hai katha sangram ki">
  <div>Hai Katha Sangram Ki</div>
</a>
<a href="songs/song3.html" class="song-card" data-title="happy birthday">
  <div>Happy Birthday</div>
</a>
</div>

</div>

<script>
const searchBox = document.getElementById("searchBox");

searchBox.addEventListener("input", function() {
  const query = this.value.toLowerCase();
  const songs = document.querySelectorAll(".song-card");

  songs.forEach(song => {
    const title = song.getAttribute("data-title");

    if (title.includes(query)) {
      song.style.display = "";
    } else {
      song.style.display = "none";
    }
  });
});
</script>

</body>
</html>
