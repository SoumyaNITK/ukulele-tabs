
<html>
<head>
  <title>Ukulele Tabs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h1><a href="index.html">Ukulele Tabs</a></h1>
</div>

<div class="container">

<!-- HERO -->
<div class="hero">
  <h2>Ukulele Tabs</h2>
  <p>Play songs easily with clean visual tabs</p>
</div>

<div class="search-wrapper">
  <input id="searchBox" placeholder="Search songs...">
</div>

<div class="divider"></div>

<div class="song-list">

<a href="song1.html" class="song-card" data-title="tujh mein rab dikhta hai">
  <div>Tujh Mein Rab Dikhta Hai</div>
</a>
</div>

</div>

<script>
const searchBox = document.getElementById("searchBox");

searchBox.addEventListener("input", function() {
  const query = this.value.toLowerCase();
  const songs = document.querySelectorAll(".song-card");

  songs.forEach(song => {
    const title = song.getAttribute("data-title");

    if (title.includes(query)) {
      song.style.display = "";
    } else {
      song.style.display = "none";
    }
  });
});
</script>

</body>
</html>
